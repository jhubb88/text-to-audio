name: Deploy text-to-audio (frontend + Lambda)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy frontend to S3
        run: |
          aws s3 sync . s3://jimmy-text-to-audio/ --delete \
            --exclude ".git/*" --exclude ".github/*" \
            --exclude "*.md" --exclude "LICENSE" --exclude ".gitignore" \
            --exclude "lambda_function.py" --exclude "deploy.sh" \
            --exclude "*.zip"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E1BM7FLW1T9GAM --paths "/*"

      - name: Check if Lambda code changed
        id: lambda_diff
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD^ HEAD | grep -q '^lambda_function.py$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Lambda code
        if: steps.lambda_diff.outputs.changed == 'true'
        run: |
          zip -j lambda.zip lambda_function.py
          aws lambda update-function-code \
            --function-name jimmy-text-to-audio \
            --zip-file fileb://lambda.zip \
            --no-cli-pager
          rm lambda.zip
